name: Daily YouTube Shorts Uploader

# Automatically run the pipeline every single day
on:
  schedule:
    - cron: '0 17 * * *'  # Runs at exactly 5:00 PM UTC every day
  workflow_dispatch:      # Gives you a manual "Run" button in the browser for testing

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
    # 1. Pull down your repository code (Updated version)
    - name: Checkout Repository Code
      uses: actions/checkout@v4.1.7

    # 2. Set up the Python environment (Updated version)
    - name: Initialize Python 3.11
      uses: actions/setup-python@v5.1.1
      with:
        python-version: '3.11'

    # 3. Pre-install FFmpeg and Node.js (Critical for yt-dlp processing and JS warnings)
    - name: Install System Engines (FFmpeg & Node)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg nodejs

    # 4. Install all Python tool dependencies 
    - name: Install Requirements
      run: |
        pip install yt-dlp google-api-python-client google-auth-oauthlib google-auth-httplib2

    # 5. Execute your main script and securely pass your secrets from the vault
    - name: Execute Daily Pipeline
      env:
        YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
        YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
        YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
      run: python agent.py
